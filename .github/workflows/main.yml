name: Siya Bot Automático 24h

on:
  schedule:
    - cron: '*/30 * * * *' # Roda sozinho a cada 30 minutos
  workflow_dispatch: # Botão para você rodar na hora que quiser pelo iPhone

jobs:
  executar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalar Dependências
        run: |
          pip install groq playwright
          playwright install chromium
      - name: Rodar o Bot
        run: python bot_siya.py
